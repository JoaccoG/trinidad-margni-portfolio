name: Testing

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Tests pass
    runs-on: ubuntu-latest

    steps:
      - name: (>) Git checkout
        uses: actions/checkout@v4

      - name: (>) Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: (>) Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: (>) Run tests
        run: cargo test
